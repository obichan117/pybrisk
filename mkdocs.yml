site_name: pybrisk
site_description: Python client for SBI BRiSK market data
site_url: https://obichan117.github.io/pybrisk/
repo_url: https://github.com/obichan117/pybrisk
repo_name: obichan117/pybrisk

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Authentication: authentication.md
  - Ticker API: ticker.md
  - Market API: market.md
  - Configuration: configuration.md
  - Backend Endpoints: endpoints.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - tables
