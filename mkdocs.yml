site_name: pybrisk
site_description: Python client for SBI BRiSK market data
site_url: https://obichan117.github.io/pybrisk/
repo_url: https://github.com/obichan117/pybrisk
repo_name: obichan117/pybrisk

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Guide:
    - Authentication: guide/authentication.md
  - API Reference:
    - Ticker: api/ticker.md
    - Market: api/market.md
    - Configuration: api/configuration.md
    - Backend Endpoints: api/endpoints.md
  - Research:
    - How It Works: research/how-it-works.md
    - Architecture: research/architecture.md
    - Overview: research/overview.md
    - API Endpoints: research/api-endpoints.md
    - Authentication: research/authentication.md
    - Data Schemas: research/data-schemas.md
    - Data Flow: research/data-flow.md
    - WebSocket Protocol: research/websocket_protocol.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - tables
